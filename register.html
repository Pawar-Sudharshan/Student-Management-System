<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav>
        <a href="index.html#home">Home </a>
        <a href="login.html#login">Login</a>
        <a href="register.html#register">Register</a>
    </nav>

    <div class="container register">
        <h1>Register</h1>
        <form action="dashboard.html" onSubmit="return true;" method="post">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br><br>

            <label for="confirm_password">Confirm Password:</label>
            <input type="password" id="confirm_password" name="confirm_password" required><br><br>

            <button type="submit">Register</button>
        </form>


        <hr>

        <p>Already have an account? </p><a href="login.html#login" style="text-decoration: none;">Login here</a>
    </div>
</body>

</html>
