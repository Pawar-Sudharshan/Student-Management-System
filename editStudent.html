<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="css/userStyle.css">
</head>
<body>
    <nav>
        <a href="dashboard.html#dashboard">Dashboard </a>
        <a href="addStudent.html#addStudent">Add Student</a>
        <a href="viewStudents.html#viewStudents">View Students</a>
        <a href="logout.html#logout">Logout</a>
    </nav>
    <h1>Edit Student</h1>
    <br> <br>
    <form id="editStudentForm" action="viewStudents.html" onSubmit="return true;" method="post">
        <label for="studentId">Student ID:</label>
        <input id="studentId" name="studentId "value="1"><br><br> <!-- This will be dynamically set to the student's ID -->
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" value="Sudharshan" required><br><br>
        <label for="cgpa">CGPA:</label>
        <input type="number" step="0.01" id="cgpa" name="cgpa" value="8.4" required><br><br>
        <button type="submit">Update Student</button>
    </form>
</body>
</html>
